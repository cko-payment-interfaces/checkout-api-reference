type: object
description: The links related to the Payment Link
minItems: 2
required:
  - self
  - redirect
properties:
  self:
    type: object
    allOf:
      - $ref: "#/components/schemas/Link"
    description: The URI of the Payment Link details
  redirect:
    type: object
    allOf:
      - $ref: "#/components/schemas/Link"
    description: The link to visit the Payment Link
example:
  self:
    href: "https://api.sandbox.checkout.com/payment-links/pl_ELqQJXdXzabU"
  redirect:
    href: "https://pay.sandbox.checkout.com/ELqQJXdXzabU"
