get:
  security:
    - ApiSecretKey: []
  tags:
    - Payment Links
  summary: Get Payment Link details
  operationId: getPaymentLinkDetails
  description: |
    Returns the details of the Payment Link with the specified identifier string.
  parameters:
    - in: path
      name: id
      schema:
        allOf:
          - $ref: "#/components/schemas/PaymentLinkId"
      required: true
      description: The Payment Link identifier
  responses:
    "200":
      description: Payment Link details retrieved successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PaymentLinkResponse"
    "401":
      description: Unauthorized
    "404":
      description: Payment Link not found
